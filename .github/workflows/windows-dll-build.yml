name: Generate PJSIP 2.16 DLL

on: 
  workflow_dispatch:

jobs:
  build-dll:
    runs-on: windows-2022

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          repository: Atchyuth022/pjproject
          ref: 'master'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
        # This automatically puts javac in the PATH, which the vcxproj requires

      - name: Install SWIG
        run: choco install swig
        # This puts swig in the PATH, which the vcxproj requires

      - name: Set up MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Configure PJSIP
        shell: cmd
        run: |
          copy pjlib\include\pj\config_site_sample.h pjlib\include\pj\config_site.h
          echo #define PJ_WIN32 1 >> pjlib\include\pj\config_site.h

      - name: Build PJSUA2 DLL
        shell: cmd
        run: |
          :: Inject Java headers into the MSVC Include path so jni.h is found
          set CL=/I"%JAVA_HOME%\include" /I"%JAVA_HOME%\include\win32"          
          :: Build using the exact targets and configurations defined in your vcxproj
          msbuild pjsip-apps\build\swig_java_pjsua2.vcxproj /p:Configuration=Release-Dynamic /p:Platform=x64

      - name: Upload DLL Artifact
        uses: actions/upload-artifact@v4
        with:
          name: pjsua2-dll-windows-x64
          # Grabbing the file from the exact output directory defined in the vcxproj
          path: pjsip-apps\src\swig\java\output\pjsua2.dll
